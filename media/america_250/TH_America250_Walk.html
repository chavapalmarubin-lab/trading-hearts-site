<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trading Hearts · America 250 · The Walk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold2:#E7C66B;--cream:#EDE6D2;--muted:#9a907a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#000;color:var(--cream);font-family:'Cormorant Garamond',Georgia,serif;}
.serif{font-family:'Playfair Display',Georgia,serif;}
button{font-family:inherit;cursor:pointer;}
#dust{position:fixed;inset:0;z-index:60;pointer-events:none;}
.screen{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity .8s ease;}
.screen.on{opacity:1;pointer-events:auto;}

/* LANDING */
#landing{background:radial-gradient(120% 80% at 50% 30%,#1a160e,#0b0a08 55%,#050505);display:flex;align-items:center;justify-content:center;text-align:center;z-index:30;}
#landing .vig{position:absolute;inset:0;box-shadow:inset 0 0 240px 60px #000;pointer-events:none;}
.star{width:60px;height:60px;margin:0 auto 24px;filter:drop-shadow(0 0 14px rgba(201,168,76,.5));}
.kicker{letter-spacing:.42em;font-size:12px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;}
#landing h1{font-size:clamp(52px,12vw,124px);line-height:.95;color:var(--cream);font-weight:700;text-shadow:0 4px 40px rgba(0,0,0,.7);}
.subi{font-style:italic;color:var(--gold2);font-size:clamp(15px,2.4vw,23px);margin-top:14px;letter-spacing:.18em;}
.rule{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:24px auto;}
#landing p.tag{color:#cdbf9f;font-size:clamp(15px,2.2vw,20px);line-height:1.7;max-width:560px;margin:0 auto 28px;}
.cta{display:inline-block;border:1px solid var(--gold);background:linear-gradient(180deg,#c9a84c,#a8842f);color:#1a1206;font-weight:600;letter-spacing:.26em;text-transform:uppercase;font-size:15px;padding:15px 34px;transition:.25s;}
.cta:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,168,76,.3);}
#landing .cineBg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
#landing .cineWash{position:absolute;inset:0;z-index:1;background:radial-gradient(125% 95% at 50% 40%,rgba(8,6,4,.22),rgba(6,5,5,.70) 72%);pointer-events:none;}
#landing .vig{z-index:1;}
#landing .lwrap{position:relative;z-index:2;}

/* MAP */
#map{background:radial-gradient(140% 100% at 50% 0%,#15120c,#08070a 60%,#050505);overflow-y:auto;z-index:20;}
#map .wrap{max-width:1180px;margin:0 auto;padding:60px 22px 90px;}
#map .head{text-align:center;margin-bottom:44px;}
#map .head .kick{letter-spacing:.4em;color:var(--gold);font-size:11px;text-transform:uppercase;}
#map .head h2{font-size:clamp(32px,6vw,54px);color:var(--cream);font-weight:700;margin-top:6px;}
/* date-band groups + 3-up horizontal grid */
.eraGroup{margin-bottom:42px;}
.eraGroup .bandLabel{text-align:center;letter-spacing:.34em;font-size:12px;color:var(--gold);text-transform:uppercase;margin-bottom:18px;padding-bottom:9px;border-bottom:1px solid #2a2740;}
.eraRow{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.era{position:relative;background:linear-gradient(160deg,#16151c,#0e0d13);border:1px solid #262433;border-radius:12px;overflow:hidden;box-shadow:0 16px 44px rgba(0,0,0,.5);transition:.3s;display:flex;flex-direction:column;}
.era:hover{border-color:var(--gold);transform:translateY(-4px);}
.era .thumb{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#0a0a0f;}
.era .thumb video,.era .thumb .ph{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;}
.era .thumb:after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 38%,rgba(8,7,10,.82));pointer-events:none;}
.era .body{flex:1;padding:15px 18px 18px;display:flex;flex-direction:column;}
.era .no{letter-spacing:.32em;font-size:10px;color:var(--gold);text-transform:uppercase;}
.era h3{font-family:'Playfair Display';font-size:21px;color:var(--cream);margin:3px 0 3px;}
.era .when{color:var(--gold2);font-style:italic;font-size:13px;margin-bottom:8px;}
.era .desc{color:#b6ac95;font-size:13.5px;line-height:1.5;flex:1;}
.era .enter{margin-top:14px;align-self:flex-start;border:1px solid var(--gold);color:var(--gold);background:transparent;padding:9px 16px;letter-spacing:.18em;font-size:12px;text-transform:uppercase;border-radius:3px;transition:.2s;cursor:pointer;}
.era .enter:hover{background:var(--gold);color:#160f04;}
.era.locked{opacity:.5;} .era.locked .enter{border-color:#3a3730;color:#6a6456;cursor:not-allowed;}
@media(max-width:820px){.eraRow{grid-template-columns:1fr;}}

/* TOWN (photoreal) */
#town{z-index:10;background:#05060a;overflow:hidden;}
#cam{position:absolute;top:0;bottom:0;left:0;will-change:transform;}
.block{position:absolute;top:0;bottom:0;background-repeat:no-repeat;background-position:left bottom;background-size:auto 100%;overflow:hidden;}
.block video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center bottom;}
.block:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,6,10,.10),transparent 30%,transparent 72%,rgba(6,5,9,.45));}
.plate{position:absolute;transform:translateX(-50%);min-width:150px;max-width:230px;padding:9px 14px;text-align:center;border-radius:4px;cursor:pointer;
  background:linear-gradient(180deg,#e7c66b,#b9923c);border:1px solid #7a5e22;
  box-shadow:0 6px 18px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.45);
  color:#241704;font-family:'Playfair Display';font-weight:700;font-size:14px;line-height:1.15;transition:.22s;z-index:4;}
.plate .no{display:block;font-family:'Cormorant Garamond';font-weight:600;font-size:10px;letter-spacing:.2em;color:#5a4310;margin-bottom:1px;}
.plate:before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:2px;height:10px;background:#7a5e22;}
.plate.near{box-shadow:0 0 0 2px var(--gold2),0 0 26px rgba(231,198,107,.8);transform:translateX(-50%) translateY(-3px) scale(1.05);}
/* walk gait is driven in JS (loop) for a natural stride, not a CSS bob */
#vig{position:absolute;inset:0;pointer-events:none;z-index:7;box-shadow:inset 0 0 220px 50px rgba(3,3,6,.6);}

#hud{position:absolute;inset:0;pointer-events:none;z-index:40;}
#hud .topbar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:linear-gradient(180deg,rgba(5,5,8,.8),transparent);pointer-events:auto;}
#hud .back{color:var(--cream);text-decoration:none;font-size:14px;letter-spacing:.1em;background:none;border:0;}
#hud .back:hover{color:var(--gold);}
#hud .eraName{text-align:center;text-shadow:0 2px 12px #000;}
#hud .eraName .k{letter-spacing:.34em;font-size:10px;color:var(--gold);text-transform:uppercase;}
#hud .eraName .t{font-family:'Playfair Display';font-size:19px;color:var(--cream);}
#hud .hint{position:absolute;left:50%;bottom:74px;transform:translateX(-50%);color:#e8dcbf;font-size:14px;letter-spacing:.12em;text-shadow:0 2px 8px #000;opacity:.9;text-align:center;}
#hud .hint kbd{display:inline-block;border:1px solid #8a7f63;border-radius:4px;padding:1px 7px;margin:0 2px;color:var(--gold2);}
#ctrls{position:absolute;bottom:18px;left:0;right:0;display:flex;justify-content:space-between;padding:0 18px;z-index:45;}
#ctrls .pad{display:flex;gap:12px;}
#ctrls button{width:60px;height:60px;border-radius:50%;border:1px solid var(--gold);background:rgba(20,18,24,.65);color:var(--gold2);font-size:26px;backdrop-filter:blur(4px);}
#ctrls .enterB{width:auto;padding:0 22px;border-radius:30px;letter-spacing:.16em;font-size:13px;text-transform:uppercase;}

/* LIGHTBOX */
#lb{position:fixed;inset:0;z-index:80;background:rgba(4,4,7,.95);opacity:0;pointer-events:none;transition:.35s;display:flex;flex-direction:column;align-items:center;}
#lb.on{opacity:1;pointer-events:auto;}
#lb .bar{width:100%;max-width:1040px;display:flex;justify-content:space-between;align-items:center;padding:16px 20px;}
#lb .bar .ttl{font-family:'Playfair Display';font-size:20px;}
#lb .bar .ttl span{color:var(--muted);font-size:13px;letter-spacing:.2em;}
#lb .x{background:none;border:1px solid #4a4438;color:var(--cream);border-radius:50%;width:40px;height:40px;font-size:18px;}
#lb .x:hover{border-color:var(--gold);color:var(--gold);}
#lb iframe{width:100%;max-width:1040px;flex:1;border:0;border-radius:10px 10px 0 0;background:#08080c;box-shadow:0 0 0 1px rgba(201,168,76,.25),0 20px 60px rgba(0,0,0,.6);}

/* CINEMATIC CUTSCENE */
#cine{position:fixed;inset:0;z-index:70;background:#000;opacity:0;pointer-events:none;transition:opacity .6s ease;}
#cine.on{opacity:1;pointer-events:auto;}
#cine video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
#cine .cwash{position:absolute;inset:0;background:linear-gradient(180deg,rgba(4,4,7,.35),transparent 24%,transparent 64%,rgba(4,4,7,.72));pointer-events:none;}
#cine .ttl{position:absolute;left:0;right:0;bottom:90px;text-align:center;pointer-events:none;}
#cine .ttl .k{letter-spacing:.4em;font-size:12px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
#cine .ttl .t{font-family:'Playfair Display';font-size:clamp(28px,5.5vw,52px);color:var(--cream);text-shadow:0 4px 22px #000;}
#cine .skip{position:absolute;bottom:30px;right:28px;border:1px solid var(--gold);background:rgba(15,12,8,.5);color:var(--gold2);padding:11px 22px;letter-spacing:.16em;text-transform:uppercase;font-size:12px;border-radius:30px;backdrop-filter:blur(4px);transition:.2s;}
#cine .skip:hover{background:var(--gold);color:#160f04;}

/* TOAST (preview eras — comic not yet rendered) */
#toast{position:fixed;left:50%;bottom:120px;transform:translateX(-50%) translateY(10px);z-index:90;background:rgba(18,15,10,.92);border:1px solid var(--gold);color:var(--cream);padding:12px 22px;border-radius:30px;font-size:15px;box-shadow:0 10px 30px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.3s;backdrop-filter:blur(4px);text-align:center;max-width:80vw;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

function readerPath(eraN,num){ if(eraN==='01'){const f=(num==='014')?'era_02/comic_014':('era_01/comic_'+num);return f+'/TH_A250_'+num+'_READER.html';} return 'era_'+eraN+'/comic_'+num+'_photoreal/TH_A250_'+num+'_DRAFT_SINGLE_IMAGE.jpg'; }

const screens={landing:document.getElementById('landing'),map:document.getElementById('map'),town:document.getElementById('town')};
let current='landing';
function go(s){screens[current].classList.remove('on');current=s;screens[s].classList.add('on');if(s==='map')buildMap();if(s!=='town')stopLoop();}
function buildMap(){const el=document.getElementById('eraList');if(el.dataset.done)return;el.dataset.done=1;
  // three horizontal date bands; each holds a 3-up row of era cards with a looping
  // background video (the era's atmospheric cinematic) on the thumbnail.
  const bands=[['1776 — 1911',0,3],['1913 — 1999',3,6],['2000 — Today',6,9]];
  bands.forEach(([label,a,b])=>{
    const g=document.createElement('div');g.className='eraGroup';
    const lab=document.createElement('div');lab.className='bandLabel';lab.textContent=label;g.appendChild(lab);
    const row=document.createElement('div');row.className='eraRow';
    ERAS.slice(a,b).forEach((e,j)=>{const i=a+j;
      const vid=Array.isArray(e.cutscene)?e.cutscene[0]:e.cutscene;
      const media=(!e.locked&&vid)
        ? `<video src="${encodeURI(vid)}" muted loop autoplay playsinline preload="metadata"></video>`
        : `<div class="ph" style="background:url(${e.thumb||A}) center/cover;${e.locked?'filter:grayscale(1) brightness(.5)':''}"></div>`;
      const d=document.createElement('div');d.className='era'+(e.locked?' locked':'');
      d.innerHTML=`<div class="thumb">${media}</div>
        <div class="body"><div class="no">Era ${e.n}</div><h3>${e.name}</h3><div class="when">${e.when}</div>
        <div class="desc">${e.desc}</div><button class="enter">${e.locked?'Coming Soon':'Enter Town →'}</button></div>`;
      if(!e.locked)d.querySelector('.enter').onclick=()=>enterTown(i);
      row.appendChild(d);});
    g.appendChild(row);el.appendChild(g);});}

/* TOWN ENGINE — photoreal blocks */
let T={era:null,x:0,dir:1,vw:0,vh:0,bw:0,worldW:0,plates:[],near:null,keys:{},raf:null,target:null};
const cam=document.getElementById('cam');
/* Cast walking the eras — full-scene Kling i2v clips, mapped to era by year, played in the era's
   cinematic sequence. Missing/still-rendering clips are skipped (onerror) so this is safe to ship
   while the batch is still generating. */
// Each era now plays its single BLENDED cast reel (the cross-dissolve of all that
// era's walk clips, built by scripts/walk_era_blend.py). onerror in playNext skips
// any era whose blend isn't rendered yet, so this is safe as 06-09 fill in.
const _B=(n)=>['walk_videos/era_blends/era'+n+'_cast_blend.mp4'];
const WALKS={
 '01':_B('01'),'02':_B('02'),'03':_B('03'),'04':_B('04'),'05':_B('05'),
 '06':_B('06'),'07':_B('07'),'08':_B('08'),'09':_B('09')
};
function enterTown(i){const e=ERAS[i];if(e.cutscene||WALKS[e.n]){playCutscene(e,()=>_doTown(i));}else _doTown(i);}
function _doTown(i){const e=ERAS[i];T.era=e;go('town');
  document.getElementById('eraK').textContent='Era '+e.n;document.getElementById('eraT').textContent=e.name;
  layout(e);T.x=T.vw*0.45;startLoop();}
function playCutscene(e,done){const c=document.getElementById('cine'),v=document.getElementById('cineV');
  document.getElementById('cineK').textContent='Era '+e.n+' · '+e.when.split('·')[0].trim();
  document.getElementById('cineT').textContent=e.name;
  const clips=(Array.isArray(e.cutscene)?e.cutscene.slice():(e.cutscene?[e.cutscene]:[])).concat(WALKS[e.n]||[]);let idx=0;
  c.classList.add('on');
  let done2=false;const finish=()=>{if(done2)return;done2=true;c.classList.remove('on');setTimeout(()=>{try{v.pause();v.removeAttribute('src');v.load();}catch(_){}},600);done();};
  const playNext=()=>{if(idx>=clips.length){finish();return;}const s=clips[idx++];
    /* walk clips are tall portrait — 'contain' shows the whole figure incl. the face (cover crops to the torso); era cinematics stay 'cover' */
    v.style.objectFit=/walk_videos\//.test(s)?'contain':'cover';
    v.src=encodeURI(s);const pr=v.play();if(pr&&pr.catch)pr.catch(()=>{});};
  v.onended=playNext;v.onerror=playNext;document.getElementById('cineSkip').onclick=finish;playNext();}
function layout(e){
  T.vw=innerWidth;T.vh=innerHeight;
  T.bw=Math.round(T.vh*(1376/768)*1.18); // block width from image aspect, slightly zoomed
  const nb=e.blocks.length;T.worldW=T.bw*nb;
  cam.style.width=T.worldW+'px';cam.innerHTML='';T.plates=[];
  // background blocks
  e.blocks.forEach((src,bi)=>{const d=document.createElement('div');d.className='block';
    d.style.left=(bi*T.bw)+'px';d.style.width=T.bw+'px';
    if(/\.mp4$/.test(src)){const v=document.createElement('video');v.src=src;v.autoplay=v.loop=v.muted=v.playsInline=true;v.setAttribute('muted','');v.setAttribute('playsinline','');
      if(bi%2===1)v.style.transform='scaleX(-1)';            // mirror odd blocks so the loop doesn't read as a tile
      v.addEventListener('loadedmetadata',()=>{try{v.currentTime=(bi*1.7)%Math.max(1,v.duration);}catch(_){}}); // stagger so neighbours aren't in lockstep
      const p=v.play();if(p&&p.catch)p.catch(()=>{});d.appendChild(v);
    }else{d.style.backgroundImage='url('+src+')';}
    cam.appendChild(d);});
  // distribute comics across blocks as gilded plaques over the storefronts
  const per=Math.ceil(e.comics.length/nb);
  e.comics.forEach((c,idx)=>{const bi=Math.floor(idx/per);const within=idx%per;
    const blockStart=bi*T.bw;const slots=per+1;const x=blockStart+T.bw*((within+1)/slots);
    const y=42+((idx%3)*7); // vary plaque height a touch
    const p=document.createElement('div');p.className='plate';p.style.left=x+'px';p.style.top=y+'%';
    p.innerHTML=`<span class="no">№ ${c[0]}</span>${c[1]}`;p.onclick=()=>openComic(c[0],c[1]);
    cam.appendChild(p);T.plates.push({el:p,x,num:c[0],title:c[1]});});
}
function startLoop(){if(!T.raf)T.raf=requestAnimationFrame(loop);}
function stopLoop(){if(T.raf){cancelAnimationFrame(T.raf);T.raf=null;}document.getElementById('town').classList.remove('walking');}
function loop(){const spd=9;let dx=0;
  if(T.keys.left)dx-=spd; if(T.keys.right)dx+=spd;
  T.x=Math.max(90,Math.min(T.worldW-90,T.x+dx));
  let camX=T.vw/2-T.x;camX=Math.min(0,Math.max(T.vw-T.worldW,camX));
  cam.style.transform='translateX('+camX+'px)';
  // highlight the plaque nearest screen-centre (pure polish; plaques are click-to-open)
  let nb=null,best=240;T.plates.forEach(p=>{const d=Math.abs(p.x-T.x);if(d<best){best=d;nb=p;}});
  if(nb!==T.near){T.plates.forEach(p=>p.el.classList.remove('near'));if(nb)nb.el.classList.add('near');T.near=nb;}
  T.raf=requestAnimationFrame(loop);}
const lb=document.getElementById('lb');
let toastT;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2600);}
function openComic(num,title){
  var _rd=T.era&&T.era.ready; var _ok=_rd?(_rd.indexOf(num)>=0):!(T.era&&T.era.preview);
  if(!_ok){showToast(title+' · № '+num+' — chapter rendering, coming soon');return;}
  document.getElementById('lbTtl').innerHTML=title+' <span>№ '+num+'</span>';document.getElementById('lbFrame').src=readerPath(T.era.n,num);lb.classList.add('on');}
function closeLB(){lb.classList.remove('on');setTimeout(()=>document.getElementById('lbFrame').src='',350);}

addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')T.keys.left=1;if(e.key==='ArrowRight'||e.key==='d')T.keys.right=1;
  if((e.key==='e'||e.key==='Enter')&&current==='town'&&T.near)openComic(T.near.num,T.near.title);
  if(e.key==='Escape'&&lb.classList.contains('on'))closeLB();});
addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key==='a')T.keys.left=0;if(e.key==='ArrowRight'||e.key==='d')T.keys.right=0;});
const press=(el,k)=>{['mousedown','touchstart'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();T.keys[k]=1;}));['mouseup','mouseleave','touchend'].forEach(ev=>el.addEventListener(ev,()=>T.keys[k]=0));};
press(document.getElementById('bL'),'left');press(document.getElementById('bR'),'right');
addEventListener('resize',()=>{if(current==='town'&&T.era)layout(T.era);});

const cv=document.getElementById('dust'),cx=cv.getContext('2d');let m=[];
function sd(){cv.width=innerWidth;cv.height=innerHeight;m=Array.from({length:40},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.5+.3,s:Math.random()*.25+.05,o:Math.random()*.45+.15}));}
sd();addEventListener('resize',sd);
(function d(){cx.clearRect(0,0,cv.width,cv.height);m.forEach(p=>{p.y-=p.s;if(p.y<-4){p.y=cv.height+4;p.x=Math.random()*cv.width;}cx.beginPath();cx.arc(p.x,p.y,p.r,0,7);cx.fillStyle='rgba(231,198,107,'+p.o+')';cx.fill();});requestAnimationFrame(d);})();
</script>
