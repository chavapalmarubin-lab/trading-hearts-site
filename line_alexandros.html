<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Underground of Civilization</title><style>body{margin:0;padding:0;overflow:hidden;background:#0B1620;font-family:'Neue Haas Grotesk',sans-serif;color:#F4F1EA;}.container{position:fixed;top:0;left:0;width:100%;height:100%;}.instructions{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#D9CBB2;pointer-events:none;}</style></head><body><div class="container"><div id="threejs-container"></div><div class="instructions">DRAG UP TO RIDE · ASCEND TOWARD LIGHT</div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>const isMobile = window.matchMedia("(max-width: 768px)").matches || navigator.maxTouchPoints > 1;const devicePixelRatio = Math.min(window.devicePixelRatio, 2);const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });renderer.setSize(window.innerWidth, window.innerHeight);renderer.setPixelRatio(devicePixelRatio);renderer.setClearColor(0x0B1620);document.getElementById('threejs-container').appendChild(renderer.domElement);const scene = new THREE.Scene();const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);camera.position.set(0, 0, 5);const controls = new THREE.OrbitControls(camera, renderer.domElement);controls.enableDamping = true;controls.dampingFactor = 0.05;controls.enablePan = false;controls.enableZoom = false;controls.enableRotate = false;controls.minPolarAngle = 0;controls.maxPolarAngle = Math.PI / 2;const light = new THREE.DirectionalLight(0xFFFFFF, 1);light.position.set(0, 10, 0);scene.add(light);const ambientLight = new THREE.AmbientLight(0xFFFFFF, 0.5);scene.add(ambientLight);const shaftGeometry = new THREE.CylinderGeometry(2, 2, 20, 32, 100);const shaftMaterial = new THREE.MeshStandardMaterial({ color: 0x2C3A47, roughness: 0.8, metalness: 0.2 });const shaft = new THREE.Mesh(shaftGeometry, shaftMaterial);shaft.rotation.x = Math.PI / 2;scene.add(shaft);const railGeometry = new THREE.CylinderGeometry(0.05, 0.05, 20, 8);const railMaterial = new THREE.MeshStandardMaterial({ color: 0xB08D57, roughness: 0.5, metalness: 0.8 });const rail = new THREE.Mesh(railGeometry, railMaterial);rail.rotation.x = Math.PI / 2;scene.add(rail);const stations = [ { year: -600, name: 'THE FIRST OWL', description: 'Athens strikes silver stamped with Athena\'s owl. A stranger takes the coin without weighing it. That is the whole miracle.', object: { name: 'Silver Tetradrachm of Athens', institution: 'Metropolitan Museum of Art', accession: '330160', url: 'https://images.metmuseum.org/CRDImages/gr/original/KN366.JPG', license: 'CC0 (Met Open Access)' } }, { year: -480, name: 'SALAMIS', description: 'Laurion silver pays for the fleet. Money buys a future.' }, { year: 1832, name: 'THE DRACHMA RETURNS', description: 'A modern Greek state revives the oldest name in money.' }, { year: 2001, name: 'THE EURO', description: 'Greece adopts the euro. The drachma is retired. A door closes.' }, { year: 2015, name: 'OXI', description: 'The banks shut. A country votes No, and signs Yes.' }, { year: 2026, name: 'DOWNTOWN', description: 'TODAY — He is still here. He remembers all of it.' } ];stations.forEach((station, index) => { const y = index * 3 - 9; const stationGeometry = new THREE.BoxGeometry(1, 0.1, 1); const stationMaterial = new THREE.MeshStandardMaterial({ color: 0xD9CBB2, roughness: 0.7, metalness: 0.1 }); const stationMesh = new THREE.Mesh(stationGeometry, stationMaterial); stationMesh.position.set(0, y, 0); scene.add(stationMesh); const textGeometry = new THREE.TextGeometry(station.year.toString(), { font: null, size: 0.3, height: 0.05 }); const textMaterial = new THREE.MeshStandardMaterial({ color: 0x0B1620 }); const textMesh = new THREE.Mesh(textGeometry, textMaterial); textMesh.position.set(-0.5, y + 0.2, 0); scene.add(textMesh); });const animate = () => { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); };animate();window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });</script></body></html>
