.meta{margin-left:auto;color:var(--dim);font-size:11.5px;text-align:right}

#ticker .ti:hover .tp{text-decoration:underline}
#ticker .tl{color:#ffd479;font-weight:700;letter-spacing:.06em}
#ticker .tp{color:#fff;font-weight:600}

td .lb{color:#aeb0c8;font-size:8.5px;letter-spacing:.06em;display:block;opacity:.85}
td .hb{position:absolute;left:0;bottom:0;height:3px;background:#fff;opacity:.85}

#drawer .drv{font-size:12.5px;color:#dcdef0;padding:7px 0;border-top:1px solid #1b1e30;line-height:1.5}

const $=s=>document.querySelector(s);
function cell(a,b){return STATE.pairs[a+'|'+b]||STATE.pairs[b+'|'+a]||null;}
function thermalOf(slug){const r=(STATE.roster||[]).find(x=>x.slug===slug);return r||{};}
function buildGrid(){
 const T=$('#grid'); let h='<tr><th class="col"></th>';
 for(const [s,n,tk] of ROSTER){const r=thermalOf(s);const hot=r.thermal?'hot':'';
   let px='';if(r.pct_24h!=null){const u=r.pct_24h>=0;px=`<div class="px ${u?'up':'dn'}">${u?'▲':'▼'}${Math.abs(r.pct_24h).toFixed(2)}%</div>`;}
   h+=`<th class="col ${hot}"><div class="nm">${n}</div><div class="tk">${tk}</div>${px}</th>`;}
 h+='</tr>';
 for(const [sa,na,tka] of ROSTER){
   const ra=thermalOf(sa);const hot=ra.thermal?'hot':'';
   let px='';if(ra.pct_24h!=null){const u=ra.pct_24h>=0;px=`<span class="px ${u?'up':'dn'}"> ${u?'▲':'▼'}${Math.abs(ra.pct_24h).toFixed(2)}%</span>`;}
   h+=`<tr><th class="row ${hot}"><span class="nm">${na}</span> <span class="tk">${tka}</span>${px}</th>`;
   for(const [sb] of ROSTER){
     if(sa===sb){h+='<td class="diag">—</td>';continue;}
     const c=cell(sa,sb);
     if(!c){h+='<td class="empty"></td>';continue;}
     const hb=`<i class="hb" style="width:${c.heat}%"></i>`;
     h+=`<td class="${c.css} t-${c.tier}" data-a="${sa}" data-b="${sb}">`+
        `<span class="ty">${c.short}</span><span class="lb">${(c.label||'').slice(0,14)}</span>${hb}</td>`;
   }
   h+='</tr>';
 }
 T.innerHTML=h;
 T.querySelectorAll('td[data-a]').forEach(td=>{
   td.onmousemove=e=>showTip(e,td.dataset.a,td.dataset.b);
   td.onmouseleave=()=>{$('#tip').style.display='none';};
   td.onclick=()=>{$('#tip').style.display='none';showDrawer(td.dataset.a,td.dataset.b);};
 });
}

function showDrawer(a,b){

 let h=`<div class="pair">${dispName(a)} <span style="color:#6a6d86">×</span> ${dispName(b)}</div>`;
 h+=`<div class="sub">${dispTick(a)} ${px(ra)} &nbsp;·&nbsp; ${dispTick(b)} ${px(rb)}</div>`;
 h+=`<span class="typ" style="background:${TYCOL[c.css]||'#10131f'};color:#fff">${c.type}</span>`;

}
function closeDrawer(){$('#drawer').classList.remove('open');$('#scrim').style.display='none';}

function showTip(e,a,b){
 const c=cell(a,b);if(!c)return;const t=$('#tip');
 const A=ROSTER.find(r=>r[0]===a)[1],B=ROSTER.find(r=>r[0]===b)[1];

 if(c.drivers&&c.drivers.length){html+='<div style="margin-top:6px;color:#8b8da6">live drivers</div>';
   c.drivers.forEach(d=>html+=`<div class="d">› ${d}</div>`);}
